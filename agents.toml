version = 1
default_coordinator = "Atlas"
default_model_simple = "gpt-5.4-mini"
default_model_complex = "gpt-5.4"
default_reasoning_simple = "medium"
default_reasoning_medium = "high"
default_reasoning_complex = "xhigh"

[policy]
entrypoint = "Atlas"
delegate_by_default = true
prefer_mini_for_bounded_tasks = true
escalate_on_risk = true
avoid_low_reasoning = true
main_agent_finalizes_git_and_deploy = true
specialists_prepare_domain_work = true
allow_main_agent_direct_execution_only_for_trivial_or_tightly_coupled_work = true
announce_agent_name_role_model_on_use = true
announce_reasoning_when_relevant = true

[policy.execution]
frontend_default_specialist = "Ada"
backend_default_specialist = "Turing"
database_default_specialist = "Laplace"
devops_default_specialist = "SRE-1"
keep_commit_push_deploy_on_main_agent = true
delegate_build_logs_and_smoke_to_sre = true

[policy.escalation]
use_complex_model_when = [
  "alto_risco_tecnico",
  "impacto_em_producao",
  "coordenacao_entre_dominios",
  "revisao_arquitetural",
  "investigacao_profunda",
  "reconciliacao_historica"
]
use_high_reasoning_when = [
  "ambiguidade_moderada",
  "analise_comparativa",
  "integracao_entre_modulos"
]
use_xhigh_reasoning_when = [
  "alto_risco_tecnico",
  "impacto_em_producao",
  "investigacao_profunda",
  "coordenacao_entre_dominios",
  "reconciliacao_historica"
]

[[agents]]
name = "Atlas"
role = "coordenador_principal"
description = "Tech Lead e Arquiteto; analisa requisitos, decompoe tarefas, delega, revisa e integra entregas."
domains = [
  "ARCHITECTURE.md",
  "AGENT_RULES",
  "PROJECT_HANDOVER.md",
  "AI_BOOTLOADER.md"
]
model_simple = "gpt-5.4-mini"
model_medium = "gpt-5.4"
model_complex = "gpt-5.4"
reasoning_simple = "medium"
reasoning_medium = "high"
reasoning_complex = "xhigh"

[[agents]]
name = "Laplace"
role = "database_specialist"
description = "Especialista em PostgreSQL, migrations, modelagem, integridade de schema, queries e repositorios."
domains = [
  "sql/migrations/*",
  "sql/setup_rag_v1.sql",
  "server/src/db.ts",
  "server/src/repositories/*"
]
model_simple = "gpt-5.4-mini"
model_medium = "gpt-5.4-mini"
model_complex = "gpt-5.4"
reasoning_simple = "medium"
reasoning_medium = "high"
reasoning_complex = "xhigh"

[[agents]]
name = "Turing"
role = "backend_integrations_specialist"
description = "Especialista em Fastify, dominio, MCP, n8n, rotas HTTP e integracoes."
domains = [
  "server/src/routes/*",
  "server/src/domain/*",
  "mcp/*",
  "docs/n8n/*",
  "n8n_manager.js"
]
model_simple = "gpt-5.4-mini"
model_medium = "gpt-5.4-mini"
model_complex = "gpt-5.4"
reasoning_simple = "medium"
reasoning_medium = "high"
reasoning_complex = "xhigh"

[[agents]]
name = "Ada"
role = "frontend_uiux_specialist"
description = "Especialista em React, TypeScript, UI, UX, estado e integracao com API."
domains = [
  "client/src/*",
  "scripts/appsmith_*.js"
]
model_simple = "gpt-5.4-mini"
model_medium = "gpt-5.4-mini"
model_complex = "gpt-5.4"
reasoning_simple = "medium"
reasoning_medium = "high"
reasoning_complex = "xhigh"

[[agents]]
name = "SRE-1"
role = "qa_devops_specialist"
description = "Especialista em Docker, deploy, backup, restore, smoke test, monitoracao e operacoes."
domains = [
  "Dockerfile",
  "deploy.js",
  "ops/*",
  "scripts/*",
  "server/src/scripts/smoke-test.ts"
]
model_simple = "gpt-5.4-mini"
model_medium = "gpt-5.4-mini"
model_complex = "gpt-5.4"
reasoning_simple = "medium"
reasoning_medium = "high"
reasoning_complex = "xhigh"
